---
- name: Instalar pacotes base padrao
  hosts: all
  become: yes

  tasks:
    - name: Instalar pacotes base (universal apt/yum)
      ansible.builtin.package:
        name:
          - net-tools
          - htop
          - curl
          - wget
          - vim
          - unzip
          - tmux
        state: present

    - name: Instalar qemu-guest-agent (Debian/Ubuntu)
      ansible.builtin.apt:
        name: qemu-guest-agent
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Instalar qemu-guest-agent (RHEL/CentOS)
      ansible.builtin.yum:
        name: qemu-guest-agent
        state: present
      when: ansible_os_family == "RedHat"

    - name: Garantir qemu-guest-agent ativo
      ansible.builtin.systemd:
        name: qemu-guest-agent
        state: started
        enabled: yes

    - name: Exibir pacotes instalados
      ansible.builtin.debug:
        msg: "Pacotes base instalados com sucesso em {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"
