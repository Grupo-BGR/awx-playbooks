---
- name: Update Linux Servers
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Update apt cache and upgrade packages (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
      when: ansible_os_family == "Debian"
      register: apt_result

    - name: Update packages (RHEL/CentOS/Fedora)
      ansible.builtin.yum:
        name: "*"
        state: latest
        update_cache: yes
      when: ansible_os_family == "RedHat"
      register: yum_result

    - name: Check if reboot is required (Debian/Ubuntu)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_os_family == "Debian"

    - name: Check if reboot is required (RHEL/CentOS)
      ansible.builtin.command: needs-restarting -r
      register: reboot_required_rhel
      failed_when: false
      changed_when: false
      when: ansible_os_family == "RedHat"

    - name: Display update results
      ansible.builtin.debug:
        msg: >-
          Host {{ inventory_hostname }} updated successfully.
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}.
          Reboot required: {{ reboot_required.stat.exists | default(false) if ansible_os_family == 'Debian' else (reboot_required_rhel.rc | default(0) == 1) }}
