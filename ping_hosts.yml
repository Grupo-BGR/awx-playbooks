---
- name: Ping all hosts
  hosts: all
  gather_facts: no

  tasks:
    - name: Ping
      ansible.builtin.ping:

    - name: Gather basic facts
      ansible.builtin.setup:
        filter: ansible_distribution*

    - name: Show OS info
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} - {{ ansible_distribution | default('unknown') }} {{ ansible_distribution_version | default('') }}"
