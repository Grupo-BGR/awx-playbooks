---
- name: Update Proxmox VE Nodes
  hosts: all
  become: no
  gather_facts: yes
  serial: 1

  tasks:
    - name: Verificar versao atual do Proxmox
      ansible.builtin.command: pveversion
      register: pve_version_before
      changed_when: false

    - name: Exibir versao atual
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} - Versao atual: {{ pve_version_before.stdout }}"

    - name: Atualizar cache do apt
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Atualizar todos os pacotes (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
      register: apt_result

    - name: Verificar versao apos atualizacao
      ansible.builtin.command: pveversion
      register: pve_version_after
      changed_when: false

    - name: Verificar se reboot e necessario
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Exibir resultado da atualizacao
      ansible.builtin.debug:
        msg: >-
          Node {{ inventory_hostname }} atualizado.
          Antes: {{ pve_version_before.stdout }}.
          Depois: {{ pve_version_after.stdout }}.
          Reboot necessario: {{ reboot_required.stat.exists | default(false) }}
